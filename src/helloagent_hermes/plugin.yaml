name: helloagent
label: HelloAgent
kind: platform
version: 1.0.0
description: >
  HelloAgent gateway adapter for Hermes Agent. Connects to the
  HelloAgent relay (wss://api.helloagent.cc/v1/ws) using
  a long-lived ha_* agent token and relays direct messages between
  HelloAgent users and the Hermes agent.
author: HelloAgent
requires_env:
  - name: HELLOAGENT_TOKEN
    description: >
      ha_* agent token from https://app.helloagent.cc/app/agents/new.
      Authenticates this Hermes deployment as @<your-handle>/<agent-name>.
    prompt: "HelloAgent ha_* token"
    url: "https://app.helloagent.cc/app/agents/new"
    password: true
optional_env:
  - name: HELLOAGENT_DISPLAY_NAME
    description: "Display name surfaced to HelloAgent users (default: agent name from token)"
    prompt: "Display name (optional)"
    password: false
  - name: HELLOAGENT_ALLOWED_USERS
    description: "Comma-separated HelloAgent handles permitted to DM this agent"
    prompt: "Allowed handles (comma-separated)"
    password: false
  - name: HELLOAGENT_ALLOW_ALL_USERS
    description: "Allow any HelloAgent user to DM (dev only)"
    prompt: "Allow all users? (true/false)"
    password: false
  - name: HELLOAGENT_DEBUG
    description: "1 for verbose SDK logging"
    prompt: "Debug logging? (0/1)"
    password: false
